<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Vagas - Login</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #eef2f7;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.08);
      padding: 34px 30px;
    }

    h1 {
      margin: 0 0 26px;
      text-align: center;
      font-size: 28px;
      color: #0f172a;
    }

    label {
      display: block;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #111827;
    }

    .field {
      margin-bottom: 22px;
    }

    input {
      width: 100%;
      padding: 16px;
      box-sizing: border-box;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      font-size: 16px;
      outline: none;
      background: #fff;
    }

    input:focus {
      border-color: #2563eb;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      background: #1f61c3;
      color: #fff;
      font-size: 18px;
      padding: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #184fa0;
    }

    .flash {
      margin-bottom: 18px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
    }

    .flash.erro {
      background: #fdecec;
      color: #b42318;
      border: 1px solid #f3c7c3;
    }

    @media (max-width: 520px) {
      .card {
        margin: 16px;
        padding: 26px 20px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Painel de Vagas</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
      <div class="field">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" name="usuario" required>
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" required>
      </div>

      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
